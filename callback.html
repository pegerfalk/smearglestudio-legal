<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmeargleStudio Publisher — authorization</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 720px;
         margin: 3rem auto; padding: 0 1.25rem; line-height: 1.6; color: #222; }
  h1 { font-size: 1.4rem; }
  code, textarea { font-family: ui-monospace, Menlo, monospace; }
  textarea { width: 100%; min-height: 5.5rem; font-size: 0.95rem; padding: 0.6rem;
             border: 1px solid #bbb; border-radius: 6px; }
  button { margin-top: 0.6rem; padding: 0.5rem 1.1rem; font-size: 1rem; cursor: pointer; }
  .ok { color: #0a7d33; } .err { color: #b00020; }
</style>
</head>
<body>
<h1>SmeargleStudio Publisher — authorization</h1>
<p id="msg">Reading the authorization response…</p>
<textarea id="code" readonly></textarea>
<button id="copy">Copy code</button>
<p id="copied" class="ok" hidden>Copied — paste it into the studio terminal.</p>
<script>
  const q = new URLSearchParams(location.search);
  const code = q.get("code"), err = q.get("error");
  const msg = document.getElementById("msg"), box = document.getElementById("code");
  if (code) {
    msg.innerHTML = '<span class="ok">✅ Authorized.</span> Copy this code and paste it back in the studio (it expires in a few minutes):';
    box.value = code;
  } else if (err) {
    msg.innerHTML = '<span class="err">❌ TikTok returned an error:</span> ' +
      err + ' — ' + (q.get("error_description") || "");
    box.value = location.search;
  } else {
    msg.textContent = "No authorization code in the URL. Start the login from the studio's auth link.";
  }
  document.getElementById("copy").onclick = async () => {
    await navigator.clipboard.writeText(box.value);
    document.getElementById("copied").hidden = false;
  };
</script>
</body>
</html>
